name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate metadata.desktop
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils
          desktop-file-validate metadata.desktop

      - name: Build .plasmoid
        run: ./package.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-usage-widget
          path: claude-usage-widget.plasmoid
          if-no-files-found: error
