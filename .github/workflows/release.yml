name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate metadata.desktop
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils
          desktop-file-validate metadata.desktop

      - name: Build .plasmoid
        run: ./package.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-usage-widget.plasmoid
          generate_release_notes: true
